<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Poster CLB</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f1f2f6;
    text-align: center;
    margin: 0;
    padding: 0;
}
h1 { margin-top: 30px; }
.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin: 40px 10px;
}
.poster {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
    width: 90%;
    max-width: 250px;
    box-sizing: border-box;
}
.poster img { width: 100%; height: auto; border-radius: 10px; }
button {
    padding: 12px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    width: 120px;
}
.btn-info { background: gray; color: white; }
.btn-register { background: blue; color: white; }
@media (max-width: 600px) {
    .container { flex-direction: column; align-items: center; gap: 15px; margin-top: 20px; }
    .poster { width: 95%; max-width: none; }
    button { width: 100%; margin: 5px 0; }
}
.progress-bar-container {
    width: 100%;
    background: #e0e0e0;
    height: 15px;
    border-radius: 8px;
    margin-top: 10px;
}
.progress-bar {
    width: 0%;
    height: 100%;
    background: #4CAF50;
    border-radius: 8px;
    transition: width 0.5s;
}
</style>
</head>
<body>
<h1>HỆ THỐNG POSTER CLB</h1>
<div class="container">

<div class="poster">
    <img src="https://picsum.photos/300?1" alt="Công Nghệ">
    <h3>CLB Công Nghệ</h3>
    <button class="btn-info" onclick="xemGioiThieu('congnghe')">Xem giới thiệu</button>
    <button class="btn-register" onclick="dangKy('congnghe')">Đăng ký</button>
    <div class="progress-bar-container">
        <div class="progress-bar" id="progressCongNghe"></div>
    </div>
</div>

<div class="poster">
    <img src="https://picsum.photos/300?2" alt="Kinh Doanh">
    <h3>CLB Kinh Doanh</h3>
    <button class="btn-info" onclick="xemGioiThieu('kinhdoanh')">Xem giới thiệu</button>
    <button class="btn-register" onclick="dangKy('kinhdoanh')">Đăng ký</button>
    <div class="progress-bar-container">
        <div class="progress-bar" id="progressKinhDoanh"></div>
    </div>
</div>

<div class="poster">
    <img src="https://picsum.photos/300?3" alt="Âm Nhạc">
    <h3>CLB Âm Nhạc</h3>
    <button class="btn-info" onclick="xemGioiThieu('amnhac')">Xem giới thiệu</button>
    <button class="btn-register" onclick="dangKy('amnhac')">Đăng ký</button>
    <div class="progress-bar-container">
        <div class="progress-bar" id="progressAmNhac"></div>
    </div>
</div>

</div>

<script>
// ==== Hàm mở Form ====
function dangKy(clb){
    let ten="", url="";
    if(clb==="congnghe"){ ten="Công Nghệ"; url="https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.1257756082=Công+nghệ"; }
    if(clb==="kinhdoanh"){ ten="Kinh Doanh"; url="https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.1257756082=Kinh+doanh"; }
    if(clb==="amnhac"){ ten="Âm Nhạc"; url="https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.1257756082=Âm+nhạc"; }
    if(confirm(`Bạn sắp đăng ký CLB ${ten}. Tiếp tục?`)){
        window.open(url,"_blank");
    }
}

// ==== Xem giới thiệu CLB ====
function xemGioiThieu(clb){
    if(clb==="congnghe") alert("CLB Công Nghệ:\n- Học lập trình\n- Làm web, game\n- Thời gian: Thứ 3 & Thứ 6\n- Phòng A101");
    if(clb==="kinhdoanh") alert("CLB Kinh Doanh:\n- Học marketing\n- Bán hàng\n- Khởi nghiệp\n- Thời gian: Thứ 4 & Thứ 7\n- Phòng B202");
    if(clb==="amnhac") alert("CLB Âm Nhạc:\n- Hát\n- Chơi nhạc cụ\n- Biểu diễn\n- Thời gian: Thứ 2 & Thứ 5\n- Phòng C303");
}

// ==== (Không còn lấy dữ liệu CSV nữa) ====
// Nếu muốn thanh tiến độ vẫn chạy, bạn có thể tự chỉnh width = 0 hoặc giữ cố định
document.getElementById("progressCongNghe").style.width = "0%";
document.getElementById("progressKinhDoanh").style.width = "0%";
document.getElementById("progressAmNhac").style.width = "0%";
</script>
</body>
</html>
