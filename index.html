<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Poster CLB</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f1f2f6;
    text-align: center;
    margin: 0;
    padding: 0;
}

h1 {
    margin-top: 30px;
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin: 40px 10px;
}

.poster {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
    width: 90%;
    max-width: 250px;
    box-sizing: border-box;
}

.poster img {
    width: 100%;
    height: auto;
    border-radius: 10px;
}

button {
    padding: 12px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    width: 120px;
}

.btn-info {
    background: gray;
    color: white;
}

.btn-register {
    background: blue;
    color: white;
}

@media (max-width: 600px) {
    .container {
        flex-direction: column;
        align-items: center;
        gap: 15px;
        margin-top: 20px;
    }

    .poster {
        width: 95%;
        max-width: none;
    }

    button {
        width: 100%;
        margin: 5px 0;
    }
}

.progress-bar-container {
    width: 100%;
    background: #e0e0e0;
    height: 15px;
    border-radius: 8px;
    margin-top: 10px;
}

.progress-bar {
    width: 0%;
    height: 100%;
    background: #4CAF50;
    border-radius: 8px;
    transition: width 0.5s;
}

.member-count {
    margin-top: 5px;
    font-weight: bold;
    color: #007BFF;
}
</style>
</head>
<body>
<h1>HỆ THỐNG POSTER CLB</h1>

<div class="container">

<div class="poster">
    <img src="https://picsum.photos/300?1" alt="Công Nghệ">
    <h3>CLB Công Nghệ</h3>
    <button class="btn-info" onclick="gioiThieu('congnghe')">Xem giới thiệu</button>
    <button class="btn-register" onclick="chonCLB('congnghe')">Đăng ký</button>
    <div class="progress-bar-container">
        <div class="progress-bar" id="progressCongNghe"></div>
    </div>
    <p class="member-count">Số thành viên đã đăng ký: <span id="countCongNghe">0</span></p>
</div>

<div class="poster">
    <img src="https://picsum.photos/300?2" alt="Kinh Doanh">
    <h3>CLB Kinh Doanh</h3>
    <button class="btn-info" onclick="gioiThieu('kinhdoanh')">Xem giới thiệu</button>
    <button class="btn-register" onclick="chonCLB('kinhdoanh')">Đăng ký</button>
    <div class="progress-bar-container">
        <div class="progress-bar" id="progressKinhDoanh"></div>
    </div>
    <p class="member-count">Số thành viên đã đăng ký: <span id="countKinhDoanh">0</span></p>
</div>

<div class="poster">
    <img src="https://picsum.photos/300?3" alt="Âm Nhạc">
    <h3>CLB Âm Nhạc</h3>
    <button class="btn-info" onclick="gioiThieu('amnhac')">Xem giới thiệu</button>
    <button class="btn-register" onclick="chonCLB('amnhac')">Đăng ký</button>
    <div class="progress-bar-container">
        <div class="progress-bar" id="progressAmNhac"></div>
    </div>
    <p class="member-count">Số thành viên đã đăng ký: <span id="countAmNhac">0</span></p>
</div>

</div>

<script>
// Biến hiển thị
let localCounts = { "Công Nghệ":0, "Kinh Doanh":0, "Âm Nhạc":0 };
const maxCounts = { "Công Nghệ":50, "Kinh Doanh":40, "Âm Nhạc":30 };

// **Link CSV publish từ Google Sheet**
const csvURL = "https://docs.google.com/spreadsheets/d/1LRlD9ap6HN-p3YeccgTndJJMVg6ZikNum1Vf7-NhkkI/export?format=csv&gid=389125926";

// Nút Đăng ký
function chonCLB(clb) {
    let clbName="", url="";
    if(clb==="congnghe"){clbName="Công Nghệ"; url="https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.1257756082=Công+nghệ";}
    if(clb==="kinhdoanh"){clbName="Kinh Doanh"; url="https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.1257756082=Kinh+doanh";}
    if(clb==="amnhac"){clbName="Âm Nhạc"; url="https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.1257756082=Âm+nhạc";}

    if(confirm(`Bạn sắp đăng ký CLB ${clbName}. Tiếp tục?`)){
        localCounts[clbName]++;
        capNhatGiaoDien();
        window.open(url,"_blank");
    }
}

// Xem giới thiệu
function gioiThieu(clb){
    if(clb==="congnghe") alert("CLB Công Nghệ:\n- Học lập trình\n- Làm web, game\n- Tham gia dự án thực tế\n- Thời gian: Thứ 3 & Thứ 6\n- Địa điểm: Phòng A101");
    if(clb==="kinhdoanh") alert("CLB Kinh Doanh:\n- Học marketing\n- Bán hàng\n- Khởi nghiệp\n- Thời gian: Thứ 4 & Thứ 7\n- Địa điểm: Phòng B202");
    if(clb==="amnhac") alert("CLB Âm Nhạc:\n- Hát\n- Chơi nhạc cụ\n- Biểu diễn\n- Thời gian: Thứ 2 & Thứ 5\n- Địa điểm: Phòng C303");
}

// Cập nhật giao diện
function capNhatGiaoDien(){
    document.getElementById("countCongNghe").innerText = localCounts["Công Nghệ"];
    document.getElementById("countKinhDoanh").innerText = localCounts["Kinh Doanh"];
    document.getElementById("countAmNhac").innerText = localCounts["Âm Nhạc"];

    document.getElementById("progressCongNghe").style.width = (localCounts["Công Nghệ"]/maxCounts["Công Nghệ"]*100)+"%";
    document.getElementById("progressKinhDoanh").style.width = (localCounts["Kinh Doanh"]/maxCounts["Kinh Doanh"]*100)+"%";
    document.getElementById("progressAmNhac").style.width = (localCounts["Âm Nhạc"]/maxCounts["Âm Nhạc"]*100)+"%";
}

// Lấy CSV và đồng bộ (chỉ cập nhật nếu CSV lớn hơn local)
async function laySoLuongCLB(){
    try{
        const res = await fetch(csvURL);
        const data = await res.text();
        const rows = data.split("\n").slice(1);
        const csvCounts = { "Công Nghệ":0, "Kinh Doanh":0, "Âm Nhạc":0 };
        rows.forEach(r=>{
            const cols = r.split(",");
            const clb = cols[4]?.trim();
            if(clb){
                if(clb.includes("Công")) csvCounts["Công Nghệ"]++;
                else if(clb.includes("Kinh")) csvCounts["Kinh Doanh"]++;
                else if(clb.includes("Âm")) csvCounts["Âm Nhạc"]++;
            }
        });
        for(const k in csvCounts){
            if(csvCounts[k] > localCounts[k]) localCounts[k] = csvCounts[k];
        }
        capNhatGiaoDien();
    }catch(e){ console.log("Lỗi lấy CSV:", e); }
}

// Chạy lần đầu + cập nhật 5 giây
laySoLuongCLB();
setInterval(laySoLuongCLB,5000);
</script>
</body>
</html>
