<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ thống CLB Trường Đại Học Sao Đỏ</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:linear-gradient(135deg,#dfe4ea,#ced6e0);text-align:center}

/* SPLASH */
#splash{
position:fixed;inset:0;
background:linear-gradient(135deg,#1e90ff,#3742fa);
display:flex;justify-content:center;align-items:center;
z-index:9999;color:#fff
}
.splash-content img{
width:120px;background:#fff;padding:10px;border-radius:50%;
animation:spin 3s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{width:200px;height:5px;background:#fff3;margin:15px auto;border-radius:5px;overflow:hidden}
.loading span{display:block;height:100%;background:#fff;animation:load 2s forwards}
@keyframes load{to{width:100%}}
.fade-out{opacity:0;transition:.8s}

/* HEADER */
h1{
margin:20px 0;font-size:26px;
background:linear-gradient(90deg,#1e90ff,#3742fa);
-webkit-background-clip:text;-webkit-text-fill-color:transparent
}

/* SEARCH */
.search-box{
margin:10px auto;
max-width:300px
}
.search-box input{
width:100%;padding:10px;border-radius:8px;border:none
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;padding:20px;max-width:1100px;margin:auto
}

/* CARD */
.poster{
background:#fff;border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
opacity:0;transform:translateY(20px);
animation:fadeIn .6s forwards
}
.poster:hover{transform:translateY(-6px)}
@keyframes fadeIn{to{opacity:1;transform:translateY(0)}}

.poster img{
width:100%;height:160px;object-fit:contain;
background:#f1f2f6;padding:10px
}

.poster h3{margin:10px 0}

/* BUTTON */
.buttons{display:flex;gap:10px;justify-content:center;margin-bottom:15px}
button{padding:10px;border:none;border-radius:8px;width:110px;font-weight:bold;cursor:pointer}
.btn-info{background:#2f3542;color:#fff}
.btn-register{background:#1e90ff;color:#fff}

/* MOBILE */
@media(max-width:600px){
button{width:100%}
.buttons{flex-direction:column}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<div class="splash-content">
<img src="https://raw.githubusercontent.com/nguyenvankhanh6112004-hub/clb-website/main/icon.jpg">
<h2>ĐẠI HỌC SAO ĐỎ</h2>
<div class="loading"><span></span></div>
</div>
</div>

<h1>HỆ THỐNG CLB<br>TRƯỜNG ĐẠI HỌC SAO ĐỎ</h1>

<div class="search-box">
<input type="text" placeholder="Tìm CLB..." onkeyup="timCLB(this.value)">
</div>

<div class="container" id="container"></div>

<script>
const clubs=[
{name:"CLB Âm Nhạc",img:"amnhac.jpg",fb:"https://www.facebook.com/amnhacsaodo"},
{name:"CLB Kinh Doanh",img:"kd.jpg",fb:"https://facebook.com/kinhdoanh"},
{name:"CLB Công Nghệ",img:"cn.jpg",fb:"https://facebook.com/congnghe"},
{name:"CLB Tay Chung Tay",img:"tct.jpg",fb:"https://www.facebook.com/taychungtay.vn"},
{name:"CLB SMC",img:"smc.jpg",fb:"https://www.facebook.com/smcsaodo"},
{name:"CLB Thanh Niên Xung Kích",img:"tnxk.jpg",fb:"https://www.facebook.com/TNXKDHSD"},
{name:"CLB Linh Quyền Đạo",img:"linhquyendao.jpg",fb:"https://www.facebook.com/"}
];

const container=document.getElementById("container");

function hienThi(ds){
container.innerHTML="";
ds.forEach(club=>{
container.innerHTML+=`
<div class="poster">
<img src="${club.img}?v=${Date.now()}">
<h3>${club.name}</h3>
<div class="buttons">
<button class="btn-info" onclick="moFB('${club.fb}')">Giới thiệu</button>
<button class="btn-register" onclick="dangKy('${club.fb}')">Đăng ký</button>
</div>
</div>`;
});
}

hienThi(clubs);

/* SEARCH */
function timCLB(key){
let k=key.toLowerCase();
hienThi(clubs.filter(c=>c.name.toLowerCase().includes(k)));
}

/* LINK FB */
function moFB(link){
window.open(link,"_blank");
}

function dangKy(link){
if(confirm("Bạn sẽ được chuyển đến trang CLB để đăng ký, tiếp tục?")){
window.open(link,"_blank");
}
}

/* SPLASH */
window.onload=()=>{
setTimeout(()=>{
document.getElementById("splash").classList.add("fade-out");
setTimeout(()=>{document.getElementById("splash").style.display="none"},800);
},2000);
};
</script>

</body>
</html>
