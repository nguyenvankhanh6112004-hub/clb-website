<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Poster CLB - Landing Page</title>

<style>
body {
    font-family: Arial;
    background: #f1f2f6;
    text-align: center;
    padding: 20px;
}

h1 {
    margin-bottom: 30px;
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.poster {
    width: 200px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

.poster img {
    width: 100%;
    border-radius: 10px;
}

button {
    padding: 8px 12px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    width: 100%;
}

.btn-info {
    background: gray;
    color: white;
}

.btn-register {
    background: #007bff;
    color: white;
}
</style>
</head>
<body>

<h1>HỆ THỐNG POSTER CLB</h1>
<p>Chọn CLB bạn muốn đăng ký:</p>

<div class="container">

<!-- Công Nghệ -->
<div class="poster">
    <img src="https://picsum.photos/300?1" alt="Công Nghệ">
    <h3>CLB Công Nghệ</h3>
    <button class="btn-register" onclick="chonCLB('congnghe')">Đăng ký</button>
</div>

<!-- Kinh Doanh -->
<div class="poster">
    <img src="https://picsum.photos/300?2" alt="Kinh Doanh">
    <h3>CLB Kinh Doanh</h3>
    <button class="btn-register" onclick="chonCLB('kinhdoanh')">Đăng ký</button>
</div>

<!-- Âm Nhạc -->
<div class="poster">
    <img src="https://picsum.photos/300?3" alt="Âm Nhạc">
    <h3>CLB Âm Nhạc</h3>
    <button class="btn-register" onclick="chonCLB('amnhac')">Đăng ký</button>
</div>

</div>

<script>
// ===== AUTO REDIRECT TỚI GOOGLE FORM =====
function chonCLB(clb) {

    if (clb === "congnghe") {
        window.location.href = "https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.1257756082=C%C3%B4ng+ngh%E1%BB%87";
    }

    if (clb === "kinhdoanh") {
        window.location.href = "https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.1257756082=Kinh+doanh";
    }

    if (clb === "amnhac") {
        window.location.href = "https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.1257756082=%C3%82m+nh%E1%BA%A1c";
    }
}
</script>

</body>
</html>
