<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ thống CLB Trường Đại Học Sao Đỏ</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:linear-gradient(135deg,#dfe4ea,#ced6e0);text-align:center}

/* SPLASH */
#splash{
position:fixed;inset:0;
background:linear-gradient(135deg,#1e90ff,#3742fa);
display:flex;justify-content:center;align-items:center;
z-index:9999;color:#fff;flex-direction:column;
}
.splash-content img{
width:100px;background:#fff;padding:8px;border-radius:50%;
animation:spin 3s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{width:200px;height:5px;background:#ffffff33;margin:15px auto;border-radius:10px;overflow:hidden;position:relative;}
.loading span{
position:absolute;left:-40%;width:40%;height:100%;
background:linear-gradient(90deg,transparent,#fff,transparent);
animation:loadingMove 1.2s linear infinite;
}
@keyframes loadingMove{0%{left:-40%}100%{left:100%}}
#percent{margin-top:10px;font-size:16px;font-weight:bold}
.fade-out{opacity:0;transition:.8s}

/* HEADER */
.header{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:20px;}
.header img{width:40px;height:40px;border-radius:50%;background:#fff;padding:4px;}
.header h1{
font-size:22px;
background:linear-gradient(90deg,#1e90ff,#3742fa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SEARCH */
.search-box{margin:10px auto;max-width:300px}
.search-box input{width:100%;padding:10px;border-radius:8px;border:none}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;padding:20px;max-width:1100px;margin:auto
}

/* CARD */
.poster{
background:#fff;border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
opacity:0;transform:translateY(20px);
animation:fadeIn .6s forwards
}
@keyframes fadeIn{to{opacity:1;transform:translateY(0)}}
.poster img{
width:100%;height:160px;object-fit:contain;
background:#f1f2f6;padding:10px
}

/* BUTTON */
.buttons{display:flex;gap:10px;justify-content:center;margin:10px}
button{
padding:10px;border:none;border-radius:8px;
width:110px;font-weight:bold;cursor:pointer
}
.btn-info{background:#2f3542;color:#fff}
.btn-register{background:#1e90ff;color:#fff}

/* MODAL */
#formBox,#confirmBox,#testBox{
display:none;
position:fixed;inset:0;
background:#0008;
justify-content:center;align-items:center;
z-index:9999
}

/* TEST UI */
.test{
background:#fff;border-radius:18px;
width:95%;max-width:420px;
padding:20px;
max-height:90vh;
overflow:auto;
text-align:left;
}
.test h3{text-align:center;margin-bottom:10px;color:#1e90ff}
.q{margin-bottom:15px}
.q p{font-weight:bold;margin-bottom:8px}
.q label{
display:block;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:6px;
cursor:pointer;
transition:.2s;
}
.q label:hover{background:#eef5ff}
.q input{margin-right:6px}

/* FORM */
.form,.confirm{
background:#fff;
padding:20px;
border-radius:15px;
width:340px;
max-height:90vh;      /* Giới hạn chiều cao */
overflow:auto;        /* Cho scroll nếu dài */
}
.form input{
width:100%;margin:6px 0;padding:9px;border-radius:6px;border:1px solid #ccc
}
.row{display:flex;gap:10px;margin-top:10px}

/* CONFIRM */
.preview{
background:linear-gradient(135deg,#eef5ff,#dfe4ff);
padding:15px;
border-radius:12px;
text-align:left;
font-size:14px;
white-space:pre-line;
line-height:1.6;

max-height:300px;   /* Giới hạn chiều cao */
overflow:auto;      /* Cuộn nội dung */
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<div class="splash-content">
<img src="https://raw.githubusercontent.com/nguyenvankhanh6112004-hub/clb-website/main/icon.jpg">
<h2>ĐẠI HỌC SAO ĐỎ</h2>
<div class="loading"><span></span></div>
<h3 id="percent">0%</h3>
</div>
</div>

<!-- HEADER -->
<div class="header">
<img src="https://raw.githubusercontent.com/nguyenvankhanh6112004-hub/clb-website/main/icon.jpg">
<h1>HỆ THỐNG CLB<br>TRƯỜNG ĐẠI HỌC SAO ĐỎ</h1>
</div>

<div class="search-box">
<input type="text" placeholder="Tìm CLB..." onkeyup="timCLB(this.value)">
</div>

<div class="container" id="container"></div>

<!-- TEST -->
<div id="testBox">
<div class="test">
<h3>BÀI TEST ĐÁNH GIÁ</h3>
<div id="questions"></div>

<div class="row">
<button onclick="nopBai()" class="btn-register">Nộp bài</button>
<button onclick="dongTest()">Thoát</button>
</div>
</div>
</div>

<!-- FORM -->
<div id="formBox"><div class="form">
<h3 id="formTitle"></h3>
<input id="ten" placeholder="Họ và tên">
<input id="lop" placeholder="Lớp">
<input id="khoa" placeholder="Khóa">
<input id="sdt" placeholder="SĐT">
<div class="row">
<button onclick="moConfirm()" class="btn-register">🚀 Gửi đơn đăng ký</button>
<button onclick="dongForm()">Hủy</button>
</div>
</div></div>

<!-- CONFIRM -->
<div id="confirmBox"><div class="confirm">
<h3>Nội dung gửi</h3>
<div class="preview" id="previewText"></div>
<div class="row">
<button onclick="gui()" class="btn-register">Gửi </button>
<button onclick="dongConfirm()">Đóng</button>
</div>
</div></div>

<script>

// ===== CLB =====
const clubs=[
{name:"CLB Âm Nhạc",img:"amnhac.jpg",fb:"amnhacsaodo"},
{name:"CLB Tay Chung Tay",img:"tct.jpg",fb:"taychungtay.vn"},
{name:"CLB SMC",img:"smc.jpg",fb:"smcsaodo"},
{name:"CLB Thanh Niên Xung Kích",img:"tnxk.jpg",fb:"TNXKDHSD"},
{name:"CLB Linh Quyền Đạo",img:"linhquyendao.jpg",
 fb:"https://www.facebook.com/people/CLB-v%C3%B5-thu%E1%BA%ADt-Linh-Quy%E1%BB%81n-%C4%90%E1%BA%A1i-H%E1%BB%8Dc-Sao-%C4%90%E1%BB%8F/100057460838671/"},
{name:"CLB Tuổi Trẻ Khởi Nghiệp",img:"ttkn.jpg",fb:"Clbtuoitrekhoinghiepsdu99"}
];

const container=document.getElementById("container");
function hienThi(ds){
container.innerHTML="";
ds.forEach(c=>{
container.innerHTML+=`
<div class="poster">
<img src="${c.img}?v=${Date.now()}">
<h3>${c.name}</h3>
<div class="buttons">
<button class="btn-info" onclick="window.open('${c.fb.startsWith("http")?c.fb:"https://facebook.com/"+c.fb}','_blank')">Giới thiệu</button>
<button class="btn-register" onclick="moTest('${c.name}','${c.fb}')">Đăng ký</button>
</div>
</div>`;
});
}
hienThi(clubs);

function timCLB(k){
hienThi(clubs.filter(c=>c.name.toLowerCase().includes(k.toLowerCase())));
}

// ===== QUESTIONS =====
const questions=[
{q:"Khi tham gia vào một tổ chức/đội nhóm, điều bạn quan tâm nhất là gì?",
a:["Có môi trường để học hỏi","Tìm bạn bè","Đóng góp cho nhóm","Dẫn dắt nhóm"]},
{q:"Bạn dành bao nhiêu thời gian cho clb?",
a:["1-3h","4-7h",">8h","Linh hoạt"]},
{q:"Nếu khác ý kiến bạn sẽ?",
a:["Im lặng","Trình bày","Thuyết phục","Xem ý kiến mọi người"]},
{q:"Khi gặp nhiệm vụ khó bạn sẽ?",
a:["Lo lắng","Tự học","Hỏi kinh nghiệm","Bỏ luôn"]},
{q:"Khi mệt bạn sẽ làm gì?",
a:["Nghỉ","Cố làm","Nhờ team hỗ trợ","Tiếp tục"]}
];

const questionBank = {

"CLB Âm Nhạc": [
{q:"Bạn có kỹ năng gì?", a:["Hát","Chơi nhạc cụ","Sáng tác","Chưa có"]},
{q:"Bạn từng biểu diễn chưa?", a:["Rồi","Chưa","Ít","Nhiều"]},
{q:"Bạn thích thể loại nhạc nào?", a:["Pop","Rap","Ballad","Khác"]},
{q:"Bạn có thể tham gia luyện tập?", a:["Thường xuyên","Cuối tuần","Linh hoạt","Ít"]},
{q:"Mục tiêu khi vào CLB?", a:["Học hỏi","Biểu diễn","Giải trí","Giao lưu"]}
],

"CLB SMC": [
{q:"Bạn có kinh nghiệm truyền thông?", a:["Có","Không","Ít","Tự học"]},
{q:"Bạn mạnh về kỹ năng nào?", a:["Content","Design","Video","Tất cả"]},
{q:"Bạn làm việc nhóm?", a:["Tốt","Ổn","Kém","Rất tốt"]},
{q:"Bạn chịu deadline?", a:["Có","Không","Tùy","Rất tốt"]},
{q:"Bạn muốn phát triển gì?", a:["Kỹ năng","Kinh nghiệm","Portfolio","Quan hệ"]}
],

"CLB Tay Chung Tay": [
{q:"Bạn thích hoạt động nào?", a:["Tình nguyện","Sự kiện","Giáo dục","Tất cả"]},
{q:"Bạn có sẵn sàng đi xa?", a:["Có","Không","Tùy","Hiếm"]},
{q:"Bạn làm việc nhóm?", a:["Tốt","Ổn","Kém","Rất tốt"]},
{q:"Bạn chịu được áp lực?", a:["Có","Không","Tùy","Rất tốt"]},
{q:"Bạn tham gia vì?", a:["Cống hiến","Trải nghiệm","Bạn bè","Phát triển"]}
]

};

let currentClub="",currentPage="";

function moTest(name,page){
currentClub=name;
currentPage=page;
testBox.style.display="flex";

let html="";
let qs = questionBank[name] || questions;

qs.forEach((item,i)=>{
html+=`
<div class="q">
<p>${i+1}. ${item.q}</p>
${item.a.map((ans,j)=>`
<label><input type="radio" name="q${i}" value="${ans}"> ${ans}</label>
`).join("")}
</div>`;
});

questionsDiv.innerHTML=html;
}

function dongTest(){testBox.style.display="none";}

const questionsDiv=document.getElementById("questions");

// ===== SUBMIT =====
let answersText="";

function nopBai(){
answersText="";
let qs = questionBank[currentClub] || questions;

for(let i=0;i<qs.length;i++){
let checked=document.querySelector(`input[name="q${i}"]:checked`);
if(!checked) return alert("⚠️ Trả lời hết câu hỏi!");
answersText+=`Câu ${i+1}: ${qs[i].q}
📌 ${checked.value}

`;
}
testBox.style.display="none";
moForm();
}

// ===== FORM =====
let currentText="";
function moForm(){
formTitle.innerText="Đăng ký "+currentClub;
formBox.style.display="flex";
}

function dongForm(){formBox.style.display="none";}

function moConfirm(){
let ten=tenEl.value,lop=lopEl.value,khoa=khoaEl.value,sdt=sdtEl.value;
if(!ten||!lop||!khoa||!sdt) return alert("⚠️ Nhập đủ thông tin!");

currentText =
`ĐĂNG KÝ CLB

Họ tên: ${ten}
Lớp: ${lop}
Khoa: ${khoa}
SĐT: ${sdt}

KẾT QUẢ TEST
${answersText.trim()}

Em xin đăng ký tham gia CLB, mong được xét duyệt ạ!`;

previewText.innerText=currentText;
confirmBox.style.display="flex";
}

function dongConfirm(){confirmBox.style.display="none";}

function gui(){
    let text = encodeURIComponent(currentText);
    let url = "https://m.me/" + currentPage + "?text=" + text;
    window.open(url, "_blank");
}

// INPUT
const tenEl=document.getElementById("ten");
const lopEl=document.getElementById("lop");
const khoaEl=document.getElementById("khoa");
const sdtEl=document.getElementById("sdt");

// LOADING
document.addEventListener("DOMContentLoaded", ()=>{
let p=0;
let load=setInterval(()=>{
p+=2;
percent.innerText=p+"%";
if(p>=100){
clearInterval(load);
splash.classList.add("fade-out");
setTimeout(()=>splash.style.display="none",800);
}
},40);
});

</script>
</body>
</html>
