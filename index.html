<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ thống CLB Trường Đại Học Sao Đỏ</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:linear-gradient(135deg,#dfe4ea,#ced6e0);text-align:center}

/* SPLASH */
#splash{
position:fixed;inset:0;
background:linear-gradient(135deg,#1e90ff,#3742fa);
display:flex;justify-content:center;align-items:center;
z-index:9999;color:#fff;flex-direction:column;
}
.splash-content img{
width:100px;background:#fff;padding:8px;border-radius:50%;
animation:spin 3s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{width:200px;height:5px;background:#ffffff33;margin:15px auto;border-radius:10px;overflow:hidden;position:relative;}
.loading span{
position:absolute;left:-40%;width:40%;height:100%;
background:linear-gradient(90deg,transparent,#fff,transparent);
animation:loadingMove 1.2s linear infinite;
}
@keyframes loadingMove{0%{left:-40%}100%{left:100%}}
#percent{margin-top:10px;font-size:16px;font-weight:bold}
.fade-out{opacity:0;transition:.8s}

/* HEADER */
.header{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:20px;}
.header img{width:40px;height:40px;border-radius:50%;background:#fff;padding:4px;}
.header h1{
font-size:22px;
background:linear-gradient(90deg,#1e90ff,#3742fa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SEARCH */
.search-box{margin:10px auto;max-width:300px}
.search-box input{width:100%;padding:10px;border-radius:8px;border:none}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;padding:20px;max-width:1100px;margin:auto
}

/* CARD */
.poster{
background:#fff;border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
opacity:0;transform:translateY(20px);
animation:fadeIn .6s forwards
}
@keyframes fadeIn{to{opacity:1;transform:translateY(0)}}
.poster img{
width:100%;height:160px;object-fit:contain;
background:#f1f2f6;padding:10px
}

/* BUTTON */
.buttons{display:flex;gap:10px;justify-content:center;margin:10px}
button{
padding:10px;border:none;border-radius:8px;
width:110px;font-weight:bold;cursor:pointer
}
.btn-info{background:#2f3542;color:#fff}
.btn-register{background:#1e90ff;color:#fff}

/* MODAL */
#formBox,#confirmBox,#testBox{
display:none;
position:fixed;inset:0;
background:#0008;
justify-content:center;align-items:center;
z-index:9999
}

/* TEST */
.test{
background:#fff;border-radius:18px;
width:95%;max-width:420px;height:90vh;
display:flex;flex-direction:column;overflow:hidden;
}
.test-header{padding:15px;border-bottom:1px solid #eee;text-align:center;}
.test-header h3{color:#1e90ff}
.progress{height:6px;background:#eee;border-radius:10px;margin:10px 0;}
.progress span{display:block;height:100%;background:#1e90ff;width:0%;}
.score{text-align:right;font-size:13px}

.slide-wrapper{flex:1;overflow:hidden}
.slide-container{display:flex;height:100%;transition:.4s}
.slide{min-width:100%;padding:15px;overflow-y:auto}
.slide p{font-weight:bold;margin-bottom:10px;line-height:1.5}

label{
display:block;padding:10px;border:1px solid #ddd;
border-radius:10px;margin-bottom:8px;cursor:pointer;
}
label:hover{background:#eef5ff}

.nav{display:flex;justify-content:space-between;padding:10px}

/* FORM */
.form,.confirm{
background:#fff;padding:20px;border-radius:15px;width:340px
}
.form input{
width:100%;margin:6px 0;padding:9px;border-radius:6px;border:1px solid #ccc
}
.row{display:flex;gap:10px;margin-top:10px}

/* CONFIRM VIP */
.confirm h3{color:#1e90ff;margin-bottom:10px}
.preview{
background:#f1f2f6;
padding:10px;
border-radius:10px;
text-align:left;
font-size:14px;
white-space:pre-line;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<div class="splash-content">
<img src="https://raw.githubusercontent.com/nguyenvankhanh6112004-hub/clb-website/main/icon.jpg">
<h2>ĐẠI HỌC SAO ĐỎ</h2>
<div class="loading"><span></span></div>
<h3 id="percent">0%</h3>
</div>
</div>

<!-- HEADER -->
<div class="header">
<img src="https://raw.githubusercontent.com/nguyenvankhanh6112004-hub/clb-website/main/icon.jpg">
<h1>HỆ THỐNG CLB<br>TRƯỜNG ĐẠI HỌC SAO ĐỎ</h1>
</div>

<div class="search-box">
<input type="text" placeholder="Tìm CLB..." onkeyup="timCLB(this.value)">
</div>

<div class="container" id="container"></div>

<!-- TEST -->
<div id="testBox">
<div class="test">
<div class="test-header">
<h3>BÀI TEST ĐÁNH GIÁ</h3>
<div class="progress"><span id="bar"></span></div>
<div class="score">Điểm: <span id="score">0</span></div>
</div>

<div class="slide-wrapper">
<div class="slide-container" id="slides"></div>
</div>

<div class="nav">
<button onclick="prev()">←</button>
<button onclick="next()">→</button>
</div>
</div>
</div>

<!-- FORM -->
<div id="formBox"><div class="form">
<h3 id="formTitle"></h3>
<input id="ten" placeholder="Họ và tên">
<input id="lop" placeholder="Lớp">
<input id="khoa" placeholder="Khóa">
<input id="sdt" placeholder="Số điện thoại">
<div class="row">
<button onclick="moConfirm()" class="btn-register">Gửi đăng ký</button>
<button onclick="dongForm()">Hủy</button>
</div>
</div></div>

<!-- CONFIRM -->
<div id="confirmBox"><div class="confirm">
<h3>📩 Xác nhận đăng ký</h3>
<div class="preview" id="previewText"></div>
<div class="row">
<button onclick="gui()" class="btn-register">Xác nhận & gửi</button>
<button onclick="dongConfirm()">Hủy</button>
</div>
</div></div>

<script>

// ===== CLB =====
const clubs=[
{name:"CLB Âm Nhạc",img:"amnhac.jpg",fb:"amnhacsaodo"},
{name:"CLB Tay Chung Tay",img:"tct.jpg",fb:"taychungtay.vn"},
{name:"CLB SMC",img:"smc.jpg",fb:"smcsaodo"},
{name:"CLB Thanh Niên Xung Kích",img:"tnxk.jpg",fb:"TNXKDHSD"},
{name:"CLB Linh Quyền Đạo",img:"linhquyendao.jpg",
 fb:"https://www.facebook.com/people/CLB-v%C3%B5-thu%E1%BA%ADt-Linh-Quy%E1%BB%81n-%C4%90%E1%BA%A1o-%C4%90%E1%BA%A1i-H%E1%BB%8Dc-Sao-%C4%90%E1%BB%8F/100057460838671/"}
];

// ===== HIỂN THỊ =====
const container=document.getElementById("container");
function hienThi(ds){
container.innerHTML="";
ds.forEach(c=>{
container.innerHTML+=`
<div class="poster">
<img src="${c.img}?v=${Date.now()}">
<h3>${c.name}</h3>
<div class="buttons">
<button class="btn-info" onclick="window.open('${c.fb.startsWith("http")?c.fb:"https://facebook.com/"+c.fb}','_blank')">Giới thiệu</button>
<button class="btn-register" onclick="moTest('${c.name}','${c.fb}')">Đăng ký</button>
</div>
</div>`;
});
}
hienThi(clubs);

function timCLB(k){
hienThi(clubs.filter(c=>c.name.toLowerCase().includes(k.toLowerCase())));
}

// ===== TEST =====
let current=0,score=0,currentClub="",currentPage="";

function moTest(name,page){
currentClub=name;
currentPage=page;
document.getElementById("testBox").style.display="flex";
current=0;score=0;

let qs=[
"Bạn có thể tham gia CLB?",
"Bạn có kỹ năng?",
"Bạn teamwork?",
"Mục tiêu?"
];

let html="";
qs.forEach((q,i)=>{
html+=`
<div class="slide">
<p>${i+1}. ${q}</p>
<label><input type="radio" name="q${i}" value="5" onchange="updateScore()"> Rất tốt</label>
<label><input type="radio" name="q${i}" value="3" onchange="updateScore()"> Bình thường</label>
<label><input type="radio" name="q${i}" value="1" onchange="updateScore()"> Ít</label>
<label><input type="radio" name="q${i}" value="0" onchange="updateScore()"> Không</label>
</div>`;
});

slides.innerHTML=html;
updateUI();
}

function updateScore(){
score=0;
document.querySelectorAll('#slides input:checked').forEach(e=>score+=+e.value);
document.getElementById("score").innerText=score;
}

function updateUI(){
slides.style.transform=`translateX(-${current*100}%)`;
bar.style.width=((current+1)/4*100)+"%";
}

function next(){current<3?(current++,updateUI()):finish();}
function prev(){if(current>0){current--;updateUI();}}

function finish(){
if(score>=10){
alert("🎉 Bạn đã đủ điều kiện đăng ký!");
testBox.style.display="none";
moForm(currentPage,currentClub);
}else{
alert("❌ Bạn chưa đạt yêu cầu!");
testBox.style.display="none";
}
}

// ===== FORM =====
let currentText="";
function moForm(p,n){
formTitle.innerText="Đăng ký "+n;
formBox.style.display="flex";
}

function dongForm(){formBox.style.display="none";}

function moConfirm(){
let ten=document.getElementById("ten").value;
let lop=document.getElementById("lop").value;
let khoa=document.getElementById("khoa").value;
let sdt=document.getElementById("sdt").value;

if(!ten||!lop||!khoa||!sdt) return alert("⚠️ Vui lòng nhập đầy đủ thông tin!");

currentText=
`🎓 ĐĂNG KÝ CLB ĐẠI HỌC SAO ĐỎ

👤 Họ tên: ${ten}
🏫 Lớp: ${lop}
📘 Khóa: ${khoa}
📞 SĐT: ${sdt}

📌 CLB đăng ký: ${currentClub}

Em xin đăng ký tham gia CLB. Mong được xét duyệt ạ!`;

previewText.innerText=currentText;
confirmBox.style.display="flex";
}

function dongConfirm(){confirmBox.style.display="none";}

// ===== VIP MESSENGER =====
function convertToMessenger(page){
if(!page) return null;

if(page.includes("facebook.com")){
try{
let url=new URL(page);
let path=url.pathname.replace(/\//g,"");

if(path.includes("people")){
let parts=page.split("/");
return parts[parts.length-2];
}
return path;
}catch{return null;}
}
return page;
}

function gui(){
let id=convertToMessenger(currentPage);
let url="https://m.me/"+id+"?text="+encodeURIComponent(currentText);
window.open(url,"_blank");
}

// ===== LOADING =====
document.addEventListener("DOMContentLoaded", ()=>{
let p=0;
let load=setInterval(()=>{
p+=2;
percent.innerText=p+"%";
if(p>=100){
clearInterval(load);
splash.classList.add("fade-out");
setTimeout(()=>splash.style.display="none",800);
}
},40);
});

</script>

</body>
</html>
