<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ thống CLB Trường Đại Học Sao Đỏ</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #dfe4ea, #ced6e0);
    text-align: center;
}

/* SPLASH */
#splash {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, #1e90ff, #3742fa);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    color: white;
}

.splash-content img {
    width: 100px;
    margin-bottom: 15px;
}

.splash-content h2 {
    font-size: 24px;
}

.splash-content p {
    opacity: 0.8;
}

.fade-out {
    opacity: 0;
    transition: 0.8s;
}

/* HEADER */
.header {
    margin: 25px 0;
}

.header h1 {
    font-size: 28px;
    line-height: 1.4;
    background: linear-gradient(90deg, #1e90ff, #3742fa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
    max-width: 1100px;
    margin: auto;
}

/* CARD */
.poster {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.poster:hover {
    transform: translateY(-6px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* IMAGE */
.poster img {
    width: 100%;
    height: 170px;
    object-fit: contain;
    background: #f1f2f6;
    padding: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.poster img:hover {
    transform: scale(1.07);
}

/* TITLE */
.poster h3 {
    margin: 12px 0;
    font-size: 17px;
    color: #2f3542;
}

/* BUTTON */
.buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    width: 110px;
    font-weight: bold;
    transition: 0.3s;
}

.btn-info {
    background: #2f3542;
    color: white;
}

.btn-info:hover {
    background: #57606f;
}

.btn-register {
    background: #1e90ff;
    color: white;
}

.btn-register:hover {
    background: #3742fa;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.modal img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 10px;
}

/* MOBILE */
@media (max-width: 600px) {
    .header h1 {
        font-size: 22px;
    }

    .container {
        padding: 10px;
        gap: 15px;
    }

    .poster img {
        height: 140px;
    }

    .buttons {
        flex-direction: column;
    }

    button {
        width: 100%;
    }
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <div class="splash-content">
        <img src="icon.png">
        <h2>ĐẠI HỌC SAO ĐỎ</h2>
        <p>Hệ thống CLB</p>
    </div>
</div>

<div class="header">
    <h1>
        HỆ THỐNG CLB<br>
        TRƯỜNG ĐẠI HỌC SAO ĐỎ
    </h1>
</div>

<div class="container" id="container"></div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="dongModal()">
    <img id="modalImg">
</div>

<script>
const clubs = [
    { name: "CLB Âm Nhạc", img: "amnhac.jpg", fb: "https://www.facebook.com/amnhacsaodo" },
    { name: "CLB Kinh Doanh", img: "kd.jpg", fb: "https://facebook.com/kinhdoanh" },
    { name: "CLB Công Nghệ", img: "cn.jpg", fb: "https://facebook.com/congnghe" },
    { name: "CLB Tay Chung Tay", img: "tct.jpg", fb: "https://www.facebook.com/taychungtay.vn" },
    { name: "CLB SMC", img: "smc.jpg", fb: "https://www.facebook.com/smcsaodo" },
    { name: "CLB Thanh Niên Xung Kích", img: "tnxk.jpg", fb: "https://www.facebook.com/TNXKDHSD" },
    { name: "CLB Linh Quyền Đạo", img: "linhquyendao.jpg", fb: "https://www.facebook.com/" }
];

const container = document.getElementById("container");

clubs.forEach(club => {
    container.innerHTML += `
        <div class="poster">
            <img src="${club.img}?v=${Date.now()}" onclick="xemAnh('${club.img}')">
            <h3>${club.name}</h3>
            <div class="buttons">
                <button class="btn-info" onclick="moFB('${club.fb}')">Giới thiệu</button>
                <button class="btn-register" onclick="dangKy('${club.fb}')">Đăng ký</button>
            </div>
        </div>
    `;
});

function moFB(link){
    window.open(link, "_blank");
}

function dangKy(link){
    if(confirm("Bạn sẽ được chuyển đến trang CLB để đăng ký, tiếp tục?")){
        window.open(link, "_blank");
    }
}

function xemAnh(src){
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalImg").src = src;
}

function dongModal(){
    document.getElementById("modal").style.display = "none";
}

/* SPLASH */
window.addEventListener("load", () => {
    setTimeout(() => {
        const splash = document.getElementById("splash");
        splash.classList.add("fade-out");

        setTimeout(() => {
            splash.style.display = "none";
        }, 800);
    }, 2000);
});
</script>

</body>
</html>
