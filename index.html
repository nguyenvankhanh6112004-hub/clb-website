<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Poster CLB</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f1f2f6;
    text-align: center;
    margin: 0;
    padding: 0;
}

h1 { margin-top: 30px; }

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin: 40px 10px;
}

.poster {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
    width: 90%;
    max-width: 250px;
    box-sizing: border-box;
}

.poster img {
    width: 100%;
    height: auto;
    border-radius: 10px;
}

button {
    padding: 12px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    width: 120px;
}

.btn-info {
    background: gray;
    color: white;
}

.btn-register {
    background: blue;
    color: white;
}

@media (max-width: 600px) {
    .container {
        flex-direction: column;
        align-items: center;
    }
    .poster {
        width: 95%;
    }
}
</style>
</head>

<body>

<h1>HỆ THỐNG POSTER CLB</h1>

<div class="container">

    <!-- Âm Nhạc -->
    <div class="poster">
        <img src="an.jpg" alt="Âm Nhạc">
        <h3>CLB Âm Nhạc</h3>
        <button class="btn-info" onclick="xemGioiThieu('amnhac')">Xem giới thiệu</button>
        <button class="btn-register" onclick="dangKy('amnhac')">Đăng ký</button>
    </div>

    <!-- Kinh Doanh -->
    <div class="poster">
        <img src="kd.jpg" alt="Kinh Doanh">
        <h3>CLB Kinh Doanh</h3>
        <button class="btn-info" onclick="xemGioiThieu('kinhdoanh')">Xem giới thiệu</button>
        <button class="btn-register" onclick="dangKy('kinhdoanh')">Đăng ký</button>
    </div>

    <!-- Công Nghệ -->
    <div class="poster">
        <img src="cn.jpg" alt="Công Nghệ">
        <h3>CLB Công Nghệ</h3>
        <button class="btn-info" onclick="xemGioiThieu('congnghe')">Xem giới thiệu</button>
        <button class="btn-register" onclick="dangKy('congnghe')">Đăng ký</button>
    </div>

</div>

<script>
function dangKy(clb){
    let url = "";

    if(clb === "congnghe"){
        url = "https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.1257756082=C%C3%B4ng+ngh%E1%BB%87";
    }

    if(clb === "kinhdoanh"){
        url = "https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.1257756082=Kinh+doanh";
    }

    if(clb === "amnhac"){
        url = "https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.1257756082=%C3%82m+nh%E1%BA%A1c";
    }

    if(confirm("Bạn muốn đăng ký CLB này?")){
        window.open(url, "_blank");
    }
}

function xemGioiThieu(clb){
    if(clb==="congnghe") alert("CLB Công Nghệ:\n- Lập trình\n- Làm web, game");
    if(clb==="kinhdoanh") alert("CLB Kinh Doanh:\n- Marketing\n- Khởi nghiệp");
    if(clb==="amnhac") alert("CLB Âm Nhạc:\n- Hát\n- Nhạc cụ");
}
</script>

</body>
</html>
