<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Poster CLB</title>

<style>
/* ===== BODY ===== */
body {
    font-family: Arial, sans-serif;
    background: #f1f2f6;
    text-align: center;
    margin: 0;
    padding: 0;
}

/* ===== TIÊU ĐỀ ===== */
h1 {
    margin-top: 30px;
}

/* ===== CONTAINER POSTER ===== */
.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin: 40px 10px;
}

/* ===== POSTER ===== */
.poster {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
    width: 90%;        /* default điện thoại */
    max-width: 250px;  /* desktop */
    box-sizing: border-box;
}

.poster img {
    width: 100%;
    height: auto;
    border-radius: 10px;
}

/* ===== NÚT ===== */
button {
    padding: 12px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    width: 120px; /* default desktop */
}

/* nút màu */
.btn-info {
    background: gray;
    color: white;
}

.btn-register {
    background: blue;
    color: white;
}

/* ===== MEDIA QUERY MOBILE ===== */
@media (max-width: 600px) {
    .container {
        flex-direction: column;
        align-items: center;
        gap: 15px;
        margin-top: 20px;
    }

    .poster {
        width: 95%;
        max-width: none;
    }

    button {
        width: 100%; /* nút chiếm hết poster */
        margin: 5px 0;
    }
}
</style>
</head>

<body>
<h1>HỆ THỐNG POSTER CLB</h1>

<div class="container">

<!-- CLB Công Nghệ -->
<div class="poster">
    <img src="https://picsum.photos/300?1" alt="Công Nghệ">
    <h3>CLB Công Nghệ</h3>
    <button class="btn-info" onclick="gioiThieu('congnghe')">Xem giới thiệu</button>
    <button class="btn-register" onclick="chonCLB('congnghe')">Đăng ký</button>
</div>

<!-- CLB Kinh Doanh -->
<div class="poster">
    <img src="https://picsum.photos/300?2" alt="Kinh Doanh">
    <h3>CLB Kinh Doanh</h3>
    <button class="btn-info" onclick="gioiThieu('kinhdoanh')">Xem giới thiệu</button>
    <button class="btn-register" onclick="chonCLB('kinhdoanh')">Đăng ký</button>
</div>

<!-- CLB Âm Nhạc -->
<div class="poster">
    <img src="https://picsum.photos/300?3" alt="Âm Nhạc">
    <h3>CLB Âm Nhạc</h3>
    <button class="btn-info" onclick="gioiThieu('amnhac')">Xem giới thiệu</button>
    <button class="btn-register" onclick="chonCLB('amnhac')">Đăng ký</button>
</div>

</div>

<script>
// ===== NÚT ĐĂNG KÝ =====
function chonCLB(clb) {
    if (clb === "congnghe") {
        window.location.href = "https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.1257756082=Công+nghệ";
    }
    if (clb === "kinhdoanh") {
        window.location.href = "https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.1257756082=Kinh+doanh";
    }
    if (clb === "amnhac") {
        window.location.href = "https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.1257756082=Âm+nhạc";
    }
}

// ===== NÚT GIỚI THIỆU =====
function gioiThieu(clb) {
    if (clb === "congnghe") {
        alert("CLB Công Nghệ:\n- Học lập trình\n- Làm web, game\n- Tham gia dự án thực tế\n- Thời gian: Thứ 3 & Thứ 6\n- Địa điểm: Phòng A101");
    }
    if (clb === "kinhdoanh") {
        alert("CLB Kinh Doanh:\n- Học marketing\n- Bán hàng\n- Khởi nghiệp\n- Thời gian: Thứ 4 & Thứ 7\n- Địa điểm: Phòng B202");
    }
    if (clb === "amnhac") {
        alert("CLB Âm Nhạc:\n- Hát\n- Chơi nhạc cụ\n- Biểu diễn\n- Thời gian: Thứ 2 & Thứ 5\n- Địa điểm: Phòng C303");
    }
}
</script>

</body>
</html>
