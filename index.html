<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ thống CLB Trường Đại Học Sao Đỏ</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:linear-gradient(135deg,#dfe4ea,#ced6e0);text-align:center}

/* SPLASH */
#splash{
position:fixed;inset:0;
background:linear-gradient(135deg,#1e90ff,#3742fa);
display:flex;justify-content:center;align-items:center;
z-index:9999;color:#fff;flex-direction:column;
}
.splash-content img{
width:100px;background:#fff;padding:8px;border-radius:50%;
animation:spin 3s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOADING */
.loading{width:200px;height:5px;background:#ffffff33;margin:15px auto;border-radius:10px;overflow:hidden;position:relative;}
.loading span{
position:absolute;left:-40%;width:40%;height:100%;
background:linear-gradient(90deg,transparent,#fff,transparent);
animation:loadingMove 1.2s linear infinite;
}
@keyframes loadingMove{0%{left:-40%}100%{left:100%}}
#percent{margin-top:10px;font-size:16px;font-weight:bold}
.fade-out{opacity:0;transition:.8s}

/* HEADER + LOGO (CHỈ THÊM PHẦN NÀY) */
.header{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-top:20px;
}
.header img{
width:40px;height:40px;border-radius:50%;background:#fff;padding:4px;
}
.header h1{
font-size:22px;
background:linear-gradient(90deg,#1e90ff,#3742fa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-align:left;
}

/* SEARCH */
.search-box{margin:10px auto;max-width:300px}
.search-box input{width:100%;padding:10px;border-radius:8px;border:none}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;padding:20px;max-width:1100px;margin:auto
}

/* CARD */
.poster{
background:#fff;border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
opacity:0;transform:translateY(20px);
animation:fadeIn .6s forwards
}
.poster:hover{transform:translateY(-6px)}
@keyframes fadeIn{to{opacity:1;transform:translateY(0)}}

.poster img{
width:100%;height:160px;object-fit:contain;
background:#f1f2f6;padding:10px
}
.poster h3{margin:10px 0}

/* BUTTON */
.buttons{display:flex;gap:10px;justify-content:center;margin-bottom:15px}
button{
padding:10px;border:none;border-radius:8px;
width:110px;font-weight:bold;cursor:pointer
}
.btn-info{background:#2f3542;color:#fff}
.btn-register{background:#1e90ff;color:#fff}

/* FORM */
#formBox,#confirmBox{
display:none;
position:fixed;inset:0;
background:#0008;
justify-content:center;align-items:center;
z-index:9999
}
.form,.confirm{
background:#fff;padding:20px;border-radius:12px;width:320px
}
.form input{
width:100%;margin:5px 0;padding:8px;border-radius:6px;border:1px solid #ccc
}
.row{display:flex;gap:10px;margin-top:10px}

/* MOBILE */
@media(max-width:600px){
.header{flex-direction:column}
.header h1{text-align:center}
button{width:100%}
.buttons{flex-direction:column}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
<div class="splash-content">
<img src="https://raw.githubusercontent.com/nguyenvankhanh6112004-hub/clb-website/main/icon.jpg">
<h2>ĐẠI HỌC SAO ĐỎ</h2>
<div class="loading"><span></span></div>
<h3 id="percent">0%</h3>
</div>
</div>

<!-- HEADER + LOGO -->
<div class="header">
<img src="https://raw.githubusercontent.com/nguyenvankhanh6112004-hub/clb-website/main/icon.jpg">
<h1>HỆ THỐNG CLB<br>TRƯỜNG ĐẠI HỌC SAO ĐỎ</h1>
</div>

<div class="search-box">
<input type="text" placeholder="Tìm CLB..." onkeyup="timCLB(this.value)">
</div>

<div class="container" id="container"></div>

<!-- FORM -->
<div id="formBox">
<div class="form">
<h3 id="formTitle"></h3>
<input id="ten" placeholder="Họ tên">
<input id="lop" placeholder="Lớp">
<input id="khoa" placeholder="Khóa">
<input id="sdt" placeholder="SĐT">
<div class="row">
<button onclick="moConfirm()" class="btn-register">Gửi</button>
<button onclick="dongForm()">Hủy</button>
</div>
</div>
</div>

<!-- CONFIRM -->
<div id="confirmBox">
<div class="confirm">
<h3>Xác nhận gửi</h3>
<pre id="previewText"></pre>
<div class="row">
<button onclick="gui()" class="btn-register">Xác nhận</button>
<button onclick="dongConfirm()">Hủy</button>
</div>
</div>
</div>

<script>
const clubs=[
{name:"CLB Âm Nhạc",img:"amnhac.jpg",fb:"amnhacsaodo"},
{name:"CLB Kinh Doanh",img:"kd.jpg",fb:"kinhdoanh"},
{name:"CLB Công Nghệ",img:"cn.jpg",fb:"congnghe"},
{name:"CLB Tay Chung Tay",img:"tct.jpg",fb:"taychungtay.vn"},
{name:"CLB SMC",img:"smc.jpg",fb:"smcsaodo"},
{name:"CLB Thanh Niên Xung Kích",img:"tnxk.jpg",fb:"TNXKDHSD"},
{name:"CLB Linh Quyền Đạo",img:"linhquyendao.jpg",fb:""}
];

const container=document.getElementById("container");

function hienThi(ds){
container.innerHTML="";
ds.forEach(club=>{
container.innerHTML+=`
<div class="poster">
<img src="${club.img}?v=${Date.now()}">
<h3>${club.name}</h3>
<div class="buttons">
<button class="btn-info" onclick="moFB('${club.fb}')">Giới thiệu</button>
<button class="btn-register" onclick="moForm('${club.fb}','${club.name}')">Đăng ký</button>
</div>
</div>`;
});
}
hienThi(clubs);

function timCLB(key){
let k=key.toLowerCase();
hienThi(clubs.filter(c=>c.name.toLowerCase().includes(k)));
}

function moFB(page){
if(!page){alert("CLB chưa có Facebook!");return;}
window.location.href="https://facebook.com/"+page;
}

let currentPage="",currentClub="",currentText="";

function moForm(page,name){
if(!page){alert("CLB chưa có Facebook!");return;}
currentPage=page;
currentClub=name;
document.getElementById("formTitle").innerText="Đăng ký "+name;
document.getElementById("formBox").style.display="flex";
}

function dongForm(){
document.getElementById("formBox").style.display="none";
}

function moConfirm(){
let ten=document.getElementById("ten").value;
let lop=document.getElementById("lop").value;
let khoa=document.getElementById("khoa").value;
let sdt=document.getElementById("sdt").value;

if(!ten||!lop||!khoa||!sdt){alert("Vui lòng nhập đầy đủ!");return;}

currentText=
"Tôi muốn đăng ký "+currentClub+"\n\n"+
"Họ tên: "+ten+"\n"+
"Lớp: "+lop+"\n"+
"Khóa: "+khoa+"\n"+
"SĐT: "+sdt;

document.activeElement.blur();

setTimeout(()=>{
document.getElementById("previewText").innerText=currentText;
document.getElementById("confirmBox").style.display="flex";
},200);
}

function dongConfirm(){
document.getElementById("confirmBox").style.display="none";
}

function gui(){
let link="https://m.me/"+currentPage+"?text="+encodeURIComponent(currentText);
window.location.href=link;
}

/* LOADING */
document.addEventListener("DOMContentLoaded", ()=>{
let p=0;
let percentText=document.getElementById("percent");

let load=setInterval(()=>{
p+=2;
if(percentText) percentText.innerText=p+"%";

if(p>=100){
clearInterval(load);
document.getElementById("splash").classList.add("fade-out");
setTimeout(()=>{document.getElementById("splash").style.display="none"},800);
}
},40);
});
</script>

</body>
</html>
