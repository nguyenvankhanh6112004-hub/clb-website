<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Hệ thống CLB</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #dfe4ea, #ced6e0);
    text-align: center;
}

h1 {
    margin: 30px 0;
    font-size: 32px;
    color: #2f3542;
}

/* GRID CÂN ĐẸP */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    padding: 30px;
    max-width: 1100px;
    margin: auto;
}

/* CARD */
.poster {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.poster:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* ẢNH */
.poster img {
    width: 100%;
    height: 180px;
    object-fit: contain;
    background: #f1f2f6;
    padding: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.poster img:hover {
    transform: scale(1.05);
}

/* TITLE */
.poster h3 {
    margin: 15px 0;
    color: #2f3542;
}

/* BUTTON */
.buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    width: 110px;
    font-weight: bold;
    transition: 0.3s;
}

.btn-info {
    background: #2f3542;
    color: white;
}

.btn-info:hover {
    background: #57606f;
}

.btn-register {
    background: #1e90ff;
    color: white;
}

.btn-register:hover {
    background: #3742fa;
}

/* MODAL XEM ẢNH */
.modal {
    display: none;
    position: fixed;
    z-index: 999;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.modal img {
    max-width: 80%;
    max-height: 80%;
    border-radius: 10px;
}

.modal:active {
    display: none;
}
</style>
</head>

<body>

<h1>HỆ THỐNG CÂU LẠC BỘ</h1>

<div class="container" id="container"></div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="dongModal()">
    <img id="modalImg">
</div>

<script>
const clubs = [
    { name: "CLB Âm Nhạc", img: "amnhac.jpg", fb: "https://www.facebook.com/amnhacsaodo" },
    { name: "CLB Kinh Doanh", img: "kd.jpg", fb: "https://facebook.com/kinhdoanh" },
    { name: "CLB Công Nghệ", img: "cn.jpg", fb: "https://facebook.com/congnghe" },

    { name: "CLB Tay Chung Tay", img: "tct.jpg", fb: "https://www.facebook.com/taychungtay.vn" },

    { name: "CLB SMC", img: "smc.jpg", fb: "https://www.facebook.com/smcsaodo" },

    { name: "CLB Thanh Niên Xung Kích", img: "tnxk.jpg", fb: "https://www.facebook.com/TNXKDHSD" },

    { name: "CLB Linh Quyền Đạo", img: "linhquyendao.jpg", fb: "https://www.facebook.com/" }
];

const container = document.getElementById("container");

clubs.forEach(club => {
    container.innerHTML += `
        <div class="poster">
            <img src="${club.img}" onclick="xemAnh('${club.img}')">
            <h3>${club.name}</h3>
            <div class="buttons">
                <button class="btn-info" onclick="moFB('${club.fb}')">Giới thiệu</button>
                <button class="btn-register" onclick="dangKy('${club.fb}')">Đăng ký</button>
            </div>
        </div>
    `;
});

/* mở facebook */
function moFB(link){
    window.open(link, "_blank");
}

/* đăng ký */
function dangKy(link){
    if(confirm("Bạn sẽ được chuyển đến trang CLB để đăng ký, tiếp tục?")){
        window.open(link, "_blank");
    }
}

/* xem ảnh to */
function xemAnh(src){
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalImg").src = src;
}

/* đóng */
function dongModal(){
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
