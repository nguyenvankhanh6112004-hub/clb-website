<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký CLB</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; margin: 50px; }
  input, button { padding: 10px; margin: 5px; font-size: 1em; }
  #member-count { font-weight: bold; color: #007BFF; }
</style>
</head>
<body>

<h1>Đăng ký CLB</h1>

<!-- Form đăng ký -->
<form id="registration-form">
  <input type="text" name="name" placeholder="Họ và tên" required><br>
  <input type="email" name="email" placeholder="Email" required><br>
  <input type="text" name="phone" placeholder="Số điện thoại" required><br>
  <button type="submit">Đăng ký</button>
</form>

<!-- Hiển thị số thành viên -->
<p>Hiện có <span id="member-count">0</span> thành viên đã đăng ký</p>

<script>
  // Hàm cập nhật số lượng thành viên
  function updateMemberCount() {
    google.script.run.withSuccessHandler(function(count) {
      document.getElementById('member-count').innerText = count;
    }).getRegisteredCount();
  }

  // Cập nhật ngay khi load
  updateMemberCount();

  // Cập nhật mỗi 5 giây
  setInterval(updateMemberCount, 5000);

  // Xử lý submit form
  document.getElementById('registration-form').addEventListener('submit', function(e){
    e.preventDefault();
    const formData = new FormData(this);
    google.script.run.withSuccessHandler(function(){
      alert("Đăng ký thành công!");
      updateMemberCount(); // cập nhật số lượng ngay sau khi đăng ký
      document.getElementById('registration-form').reset(); // reset form
    }).submitRegistration(Object.fromEntries(formData.entries()));
  });
</script>

</body>
</html>
