<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Poster CLB</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f1f2f6;
    text-align: center;
    margin: 0;
    padding: 0;
}
h1 { margin-top: 30px; }
.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin: 40px 10px;
}
.poster {
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
    width: 90%;
    max-width: 250px;
    box-sizing: border-box;
}
.poster img { width: 100%; height: auto; border-radius: 10px; }
button {
    padding: 12px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    width: 120px;
}
.btn-info { background: gray; color: white; }
.btn-register { background: blue; color: white; }
@media (max-width: 600px) {
    .container { flex-direction: column; align-items: center; gap: 15px; margin-top: 20px; }
    .poster { width: 95%; max-width: none; }
    button { width: 100%; margin: 5px 0; }
}
.progress-bar-container {
    width: 100%;
    background: #e0e0e0;
    height: 15px;
    border-radius: 8px;
    margin-top: 10px;
}
.progress-bar {
    width: 0%;
    height: 100%;
    background: #4CAF50;
    border-radius: 8px;
    transition: width 0.5s;
}
.member-count {
    margin-top: 5px;
    font-weight: bold;
    color: #007BFF;
}
</style>
</head>
<body>
<h1>HỆ THỐNG POSTER CLB</h1>
<div class="container">

<div class="poster">
    <img src="https://picsum.photos/300?1" alt="Công Nghệ">
    <h3>CLB Công Nghệ</h3>
    <button class="btn-info" onclick="xemGioiThieu('congnghe')">Xem giới thiệu</button>
    <button class="btn-register" onclick="dangKy('congnghe')">Đăng ký</button>
    <div class="progress-bar-container">
        <div class="progress-bar" id="progressCongNghe"></div>
    </div>
    <p class="member-count">Số thành viên đã đăng ký: <span id="countCongNghe">0</span></p>
</div>

<div class="poster">
    <img src="https://picsum.photos/300?2" alt="Kinh Doanh">
    <h3>CLB Kinh Doanh</h3>
    <button class="btn-info" onclick="xemGioiThieu('kinhdoanh')">Xem giới thiệu</button>
    <button class="btn-register" onclick="dangKy('kinhdoanh')">Đăng ký</button>
    <div class="progress-bar-container">
        <div class="progress-bar" id="progressKinhDoanh"></div>
    </div>
    <p class="member-count">Số thành viên đã đăng ký: <span id="countKinhDoanh">0</span></p>
</div>

<div class="poster">
    <img src="https://picsum.photos/300?3" alt="Âm Nhạc">
    <h3>CLB Âm Nhạc</h3>
    <button class="btn-info" onclick="xemGioiThieu('amnhac')">Xem giới thiệu</button>
    <button class="btn-register" onclick="dangKy('amnhac')">Đăng ký</button>
    <div class="progress-bar-container">
        <div class="progress-bar" id="progressAmNhac"></div>
    </div>
    <p class="member-count">Số thành viên đã đăng ký: <span id="countAmNhac">0</span></p>
</div>

</div>

<script>
// Link CSV từ Google Sheet đã công khai
const csvURL = "https://docs.google.com/spreadsheets/d/1LRlD9ap6HN-p3YeccgTndJJMVg6ZikNum1Vf7-NhkkI/export?format=csv&gid=1881348908";

// Biến chứa số lượng hiện tại
let soLuongCLB = { "Công Nghệ":0, "Kinh Doanh":0, "Âm Nhạc":0 };
const maxCLB = { "Công Nghệ":50, "Kinh Doanh":40, "Âm Nhạc":30 };

// Hàm mở Google Form
function dangKy(clb){
    let ten="", url="";
    if(clb==="congnghe"){ ten="Công Nghệ"; url="https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.1257756082=Công+nghệ"; }
    if(clb==="kinhdoanh"){ ten="Kinh Doanh"; url="https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.1257756082=Kinh+doanh"; }
    if(clb==="amnhac"){ ten="Âm Nhạc"; url="https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.1257756082=Âm+nhạc"; }
    if(confirm(`Bạn sắp đăng ký CLB ${ten}. Tiếp tục?`)){
        window.open(url,"_blank");
    }
}

// Hàm xem giới thiệu
function xemGioiThieu(clb){
    if(clb==="congnghe") alert("CLB Công Nghệ:\n- Học lập trình\n- Làm web, game\n- Thời gian: Thứ 3 & Thứ 6\n- Phòng A101");
    if(clb==="kinhdoanh") alert("CLB Kinh Doanh:\n- Học marketing\n- Bán hàng\n- Khởi nghiệp\n- Thời gian: Thứ 4 & Thứ 7\n- Phòng B202");
    if(clb==="amnhac") alert("CLB Âm Nhạc:\n- Hát\n- Chơi nhạc cụ\n- Biểu diễn\n- Thời gian: Thứ 2 & Thứ 5\n- Phòng C303");
}

// Cập nhật giao diện
function capNhatGiaoDien(){
    document.getElementById("countCongNghe").innerText = soLuongCLB["Công Nghệ"];
    document.getElementById("countKinhDoanh").innerText = soLuongCLB["Kinh Doanh"];
    document.getElementById("countAmNhac").innerText = soLuongCLB["Âm Nhạc"];

    document.getElementById("progressCongNghe").style.width = (soLuongCLB["Công Nghệ"]/maxCLB["Công Nghệ"]*100)+"%";
    document.getElementById("progressKinhDoanh").style.width = (soLuongCLB["Kinh Doanh"]/maxCLB["Kinh Doanh"]*100)+"%";
    document.getElementById("progressAmNhac").style.width = (soLuongCLB["Âm Nhạc"]/maxCLB["Âm Nhạc"]*100)+"%";
}

// Lấy dữ liệu CSV và cập nhật số lượng
async function capNhatSoLuongTuSheet(){
    try {
        const res = await fetch(csvURL);
        const text = await res.text();
        const rows = text.split("\n").slice(1);
        let temp = { "Công Nghệ":0, "Kinh Doanh":0, "Âm Nhạc":0 };
        rows.forEach(r=>{
            const cols = r.split(",");
            const clb = cols[2]?.trim();  // cột CLB trong Sheet
            if(clb){
                if(clb.includes("Công")) temp["Công Nghệ"]++;
                else if(clb.includes("Kinh")) temp["Kinh Doanh"]++;
                else if(clb.includes("Âm")) temp["Âm Nhạc"]++;
            }
        });
        soLuongCLB = temp;
        capNhatGiaoDien();
    } catch(e){
        console.error("Lỗi lấy dữ liệu CSV:", e);
    }
}

// Mở đầu & cập nhật định kỳ
capNhatSoLuongTuSheet();
setInterval(capNhatSoLuongTuSheet, 5000);
</script>
</body>
</html>
