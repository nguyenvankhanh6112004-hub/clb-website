<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Poster CLB</title>

<style>
body {
    font-family: Arial;
    background: #f1f2f6;
    text-align: center;
}

.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 40px;
    flex-wrap: wrap;
}

.poster {
    width: 250px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

.poster img {
    width: 100%;
    border-radius: 10px;
}

button {
    padding: 8px 12px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.btn-info {
    background: gray;
    color: white;
}

.btn-register {
    background: blue;
    color: white;
}
</style>
</head>

<body>

<h1>HỆ THỐNG POSTER CLB</h1>

<div class="container">

<!-- CLB Công Nghệ -->
<div class="poster">
    <img src="https://picsum.photos/300?1">
    <h3>CLB Công Nghệ</h3>
    <button class="btn-info" onclick="gioiThieu('congnghe')">Xem giới thiệu</button>
    <button class="btn-register" onclick="chonCLB('congnghe')">Đăng ký</button>
</div>

<!-- CLB Kinh Doanh -->
<div class="poster">
    <img src="https://picsum.photos/300?2">
    <h3>CLB Kinh Doanh</h3>
    <button class="btn-info" onclick="gioiThieu('kinhdoanh')">Xem giới thiệu</button>
    <button class="btn-register" onclick="chonCLB('kinhdoanh')">Đăng ký</button>
</div>

<!-- CLB Âm Nhạc -->
<div class="poster">
    <img src="https://picsum.photos/300?3">
    <h3>CLB Âm Nhạc</h3>
    <button class="btn-info" onclick="gioiThieu('amnhac')">Xem giới thiệu</button>
    <button class="btn-register" onclick="chonCLB('amnhac')">Đăng ký</button>
</div>

</div>

<script>

// ===== NÚT ĐĂNG KÝ =====
function chonCLB(clb) {

    if (clb === "congnghe") {
        window.location.href = "https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.15055547=test&entry.450178437=0123456789&entry.1158255963=123456&entry.1257756082=C%C3%B4ng+ngh%E1%BB%87";
    }

    if (clb === "kinhdoanh") {
        window.location.href = "https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.15055547=test&entry.450178437=0123456789&entry.1158255963=123456&entry.1257756082=Kinh+doanh";
    }

    if (clb === "amnhac") {
        window.location.href = "https://docs.google.com/forms/d/e/1FAIpQLSfHWZpm9wmKxtV72wmQK34qFt1KwWWyEOEaZLVk3rrq3V38GQ/viewform?usp=pp_url&entry.15055547=test&entry.450178437=0123456789&entry.1158255963=123456&entry.1257756082=%C3%82m+nh%E1%BA%A1c";
    }
}

// ===== NÚT GIỚI THIỆU =====
function gioiThieu(clb) {

    if (clb === "congnghe") {
        alert("CLB Công Nghệ:\n- Học lập trình\n- Làm web, game\n- Tham gia dự án thực tế");
    }

    if (clb === "kinhdoanh") {
        alert("CLB Kinh Doanh:\n- Học marketing\n- Bán hàng\n- Khởi nghiệp");
    }

    if (clb === "amnhac") {
        alert("CLB Âm Nhạc:\n- Hát\n- Chơi nhạc cụ\n- Biểu diễn");
    }
}

</script>

</body>
</html>
