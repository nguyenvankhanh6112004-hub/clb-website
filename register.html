<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng ký CLB</title>
</head>
<body>

<h2>Đăng ký CLB kinh doanh</h2>

<form id="form">
  <input type="text" id="name" placeholder="Họ tên" required><br><br>
  <input type="text" id="studentId" placeholder="Mã sinh viên" required><br><br>
  <input type="text" id="class" placeholder="Lớp" required><br><br>
  <input type="text" id="phone" placeholder="Số điện thoại" required><br><br>
  <button type="submit">Đăng ký</button>
</form>

<p id="msg"></p>

<script type="module">
// ================= FIREBASE =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjfMMxd9mP1tlswUQJ_ZhOGpwYDjtp4dI",
  authDomain: "clb-system.firebaseapp.com",
  projectId: "clb-system",
  storageBucket: "clb-system.firebasestorage.app",
  messagingSenderId: "605215311578",
  appId: "1:605215311578:web:b086ee29b939568b9487e3",
  measurementId: "G-N91QHT6EG1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= ĐĂNG KÝ =================
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const studentId = document.getElementById("studentId").value;
  const className = document.getElementById("class").value;
  const phone = document.getElementById("phone").value;

  // ❌ CHỐNG GIẢ MẠO (trùng MSSV hoặc SĐT)
  const q1 = query(collection(db, "students"), where("studentId", "==", studentId));
  const q2 = query(collection(db, "students"), where("phone", "==", phone));

  const check1 = await getDocs(q1);
  const check2 = await getDocs(q2);

  if (!check1.empty || !check2.empty) {
    document.getElementById("msg").innerText = "❌ Đã tồn tại!";
    return;
  }

  // ✅ Lưu database
  await addDoc(collection(db, "students"), {
    name,
    studentId,
    class: className,
    phone,
    time: new Date()
  });

  document.getElementById("msg").innerText = "✅ Đăng ký thành công!";
  document.getElementById("form").reset();
});
</script>

</body>
</html>
